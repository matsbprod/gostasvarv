<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pine:  #0a0a08;
      --sand:  #d4c4a0;
      --sand-lt: #ede4cf;
      --rust:  #a0522d;
      --rust-lt: #c8733d;
      --green: #c8d8b0;
      --ink:   #1a1a18;
      --nav-h: 320px;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Source Serif 4', serif; background: var(--green); color: var(--ink); overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(0,0,0,0.97);
      display: flex; align-items: KEEP; justify-content: space-between;
      padding: 0 2.5rem;
      border-bottom: 1px solid rgba(212,196,160,0.15);
    }
    .nav-logo { text-decoration: none; display: flex; align-items: KEEP; }
    .nav-logo img { height: 308px; width: auto; display: block; filter: invert(1) brightness(2); }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: KEEP; }
    .nav-links a {
      font-family: 'DM Mono', monospace; font-size: 1.4rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--sand); text-decoration: none;
      padding: 0.25rem 0; border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--sand-lt); border-bottom-color: var(--rust-lt); }
    .nav-burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; }
    .nav-burger span { display: block; width: 26px; height: 2px; background: var(--sand); }
    @media (max-width: 800px) {
      .nav-links { display: none; }
      .nav-burger { display: flex; }
      nav.open .nav-links {
        display: flex; flex-direction: column; position: absolute;
        top: var(--nav-h); left: 0; right: 0;
        background: rgba(0,0,0,0.98); padding: 1.5rem 2rem; gap: 1.2rem;
      }
    }

    /* MAIN */
    main { margin-top: var(--nav-h); padding: 5rem 2.5rem 6rem; max-width: 1200px; margin-left: auto; margin-right: auto; }
    main { margin-top: var(--nav-h); }

    .page-header { padding: 4rem 2.5rem 3rem; max-width: 1200px; margin: 0 auto; }
    .section-label {
      font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--rust); margin-bottom: 1rem;
      display: flex; align-items: KEEP; gap: 0.7rem;
    }
    .section-label::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--rust); }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; }
    .subtitle { font-size: 1rem; color: var(--ink); opacity: 0.6; margin-bottom: 3rem; }

    /* GALLERY GRID */
    .gallery {
      max-width: 1200px; margin: 0 auto; padding: 0 2.5rem 6rem;
      columns: 3; column-gap: 6px;
    }
    @media (max-width: 900px) { .gallery { columns: 2; } }
    @media (max-width: 500px) { .gallery { columns: 1; } }

    .gallery-item {
      break-inside: avoid; margin-bottom: 6px;
      cursor: zoom-in; overflow: hidden; display: block;
      background: var(--pine);
    }
    .gallery-item img {
      width: 100%; height: auto; display: block;
      transition: transform 0.4s, opacity 0.2s;
      filter: sepia(0.1) contrast(1.03);
    }
    .gallery-item:hover img { transform: scale(1.03); opacity: 0.9; filter: sepia(0) contrast(1.05); }

    /* LIGHTBOX */
    .lb-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.93); align-items: KEEP; justify-content: center; cursor: zoom-out;
    }
    .lb-overlay.active { display: flex; }
    .lb-inner { position: relative; max-width: 92vw; max-height: 92vh; cursor: default; }
    .lb-inner img { max-width: 92vw; max-height: 92vh; object-fit: contain; display: block; box-shadow: 0 20px 80px rgba(0,0,0,0.8); }
    .lb-close {
      position: fixed; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 1.4rem; line-height: 44px; text-align: center;
      cursor: pointer; transition: background 0.2s; z-index: 1001;
    }
    .lb-close:hover { background: rgba(255,255,255,0.25); }
    .lb-prev, .lb-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; font-size: 1.8rem; width: 52px; height: 72px;
      cursor: pointer; display: flex; align-items: KEEP; justify-content: center;
      transition: background 0.2s; z-index: 1001;
    }
    .lb-prev { left: 1rem; } .lb-next { right: 1rem; }
    .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.25); }
    .lb-counter {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em;
      color: rgba(255,255,255,0.45); text-transform: uppercase;
    }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: KEEP; gap: 0.5rem;
      font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--rust); text-decoration: none;
      margin-bottom: 2rem;
    }
    .back-link:hover { color: var(--rust-lt); }
  </style>
</head>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lb-overlay">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-prev" id="lb-prev">&#8249;</button>
  <div class="lb-inner"><img id="lb-img" src="" alt=""></div>
  <button class="lb-next" id="lb-next">&#8250;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
  // Mobile nav
  document.getElementById('burger').addEventListener('click', () => {
    document.getElementById('main-nav').classList.toggle('open');
  });

  // Lightbox
  const items   = Array.from(document.querySelectorAll('.gallery-item img'));
  const overlay = document.getElementById('lb-overlay');
  const lbImg   = document.getElementById('lb-img');
  const lbCtr   = document.getElementById('lb-counter');
  let current   = 0;

  function show(idx) {
    current = (idx + items.length) % items.length;
    lbImg.src = items[current].src;
    lbImg.alt = items[current].alt;
    lbCtr.textContent = (current + 1) + ' / ' + items.length;
  }

  document.getElementById('gallery').addEventListener('click', e => {
    const item = e.target.closest('.gallery-item');
    if (!item) return;
    show(items.indexOf(item.querySelector('img')));
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  });

  function close() { overlay.classList.remove('active'); document.body.style.overflow = ''; lbImg.src = ''; }
  document.getElementById('lb-close').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); show(current - 1); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); show(current + 1); });
  document.addEventListener('keydown', e => {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });
</script>
